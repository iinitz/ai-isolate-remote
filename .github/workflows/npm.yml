name: npm Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm install --no-audit --no-fund

      - run: npm run build

      # No NODE_AUTH_TOKEN: auth happens via OIDC trusted publishing.
      # Provenance is generated automatically for trusted publishers.
      - run: npm publish
